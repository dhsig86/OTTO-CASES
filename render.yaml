services:
  - type: web
    name: otto-cases-backend
    env: python
    buildCommand: "cd otto-cases-backend && pip install -r requirements.txt"
    startCommand: "cd otto-cases-backend && uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
